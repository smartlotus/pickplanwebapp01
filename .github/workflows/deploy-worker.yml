name: Deploy Worker

on:
  push:
    branches:
      - main
    paths:
      - tools/cloudflare-push-worker/**
  workflow_dispatch:

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install worker dependencies
        working-directory: tools/cloudflare-push-worker
        run: npm install

      - name: Check worker entry
        working-directory: tools/cloudflare-push-worker
        run: npm run check

      - name: Deploy worker
        working-directory: tools/cloudflare-push-worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
        run: npx wrangler deploy
